---
layout: page
title: ""
---

<div class="home-profile">
  <img src="{{ '/assets/img/aneel-avatar.png' | relative_url }}" alt="Aneel Dadani" class="home-avatar">
  <div class="home-profile-text">
    <h1 class="home-name">Aneel Dadani</h1>
    <p class="home-bio">Security leader, tinkerer, and occasional speaker. Writing about cybersecurity, AI, and the tools worth understanding.</p>
  </div>
</div>

<ul class="post-list">
  {% for post in site.posts %}
    <li class="post-list-item">
      <time class="post-list-date" datetime="{{ post.date | date_to_xmlschema }}">
        {{ post.date | date: site.date_format }}
      </time>
      <a href="{{ post.url | relative_url }}" class="post-list-title">
        {{ post.title }}
      </a>
    </li>
  {% endfor %}
</ul>
